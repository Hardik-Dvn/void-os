# local dev setup
services:
  # api
  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - NODE_ENV=development
    volumes:
      - ../apps/api:/usr/src/app
    working_dir: /usr/src/app
    command: npm run dev
  # web
  web:
    build:
      context: ../apps/web
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:4000
    volumes:
      - ../apps/web:/usr/src/app
    working_dir: /usr/src/app
    command: npm run dev
